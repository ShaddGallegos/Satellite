    # ========================================
    # CREDENTIAL CLEANUP AND SECURITY
    # ========================================
    - name: Credential cleanup and security tasks
      block:
        - name: Clear sensitive variables from memory
          set_fact:
            redhat_password: ""
            satellite_admin_password: ""
          when: not store_credentials_in_vault

        - name: Remove temporary credential files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/vault_pass
            - /tmp/redhat_credentials
            - /tmp/satellite_admin_pass
          ignore_errors: yes

        - name: Clear ansible facts containing credentials
          shell: |
            unset redhat_password
            unset satellite_admin_password
          delegate_to: localhost
          ignore_errors: yes

        - name: Clear shell history of credential entries
          shell: |
            history -c
            history -w
          ignore_errors: yes

        - name: Secure credential storage notification
          debug:
            msg: |
              
              [SECURITY] CREDENTIAL CLEANUP COMPLETED
              =======================================================================
              {% if store_credentials_in_vault -%}
              [STORED] Credentials have been stored in encrypted vault: {{ vault_file_path }}
              [ACCESS] Use --vault-password-file to access stored credentials
              {% else -%}
              [CLEARED] All credentials have been cleared from system memory
              [SECURITY] Credentials must be re-entered for future deployments
              {% endif -%}
              
              [CLEANUP] Temporary credential files removed
              [CLEANUP] Shell history cleared of credential entries
              [CLEANUP] Ansible facts cleared of sensitive data
              =======================================================================

