      debug:
        msg: |
          
          [SUCCESS] SATELLITE DEPLOYMENT COMPLETED SUCCESSFULLY!
          
          =======================================================================
          
          [REPORTS] Reports Generated:
          - /var/log/satellite_deployment_report.log (detailed)
